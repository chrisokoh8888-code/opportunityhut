<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpportunityHut</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold text-center mb-6">
    OpportunityHut 🚀
  </h1>

  <!-- Filters -->
  <div class="flex justify-center gap-4 mb-6">
    <select id="categoryFilter" class="p-2 border rounded">
      <option>All</option>
      <option>YouTube</option>
      <option>Apps</option>
      <option>Crypto</option>
      <option>Ecommerce</option>
      <option>Digital Product</option>
    </select>

    <select id="stageFilter" class="p-2 border rounded">
      <option>All</option>
      <option>Early</option>
      <option>Growing</option>
      <option>Saturated</option>
    </select>
  </div>

  <!-- Cards Container -->
  <div id="trendsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <script>
    const SUPABASE_URL = "https://kskruztjvoxmufgexvwc.supabase.coL";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtza3J1enRqdm94bXVmZ2V4dndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTgwODEsImV4cCI6MjA4OTc3NDA4MX0.CgDZF0OeT8d8AIsHrnQBkkTBYwAkM8o5h82zIXOmoEw";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const container = document.getElementById("trendsContainer");
    const categoryFilter = document.getElementById("categoryFilter");
    const stageFilter = document.getElementById("stageFilter");

    function getColor(score) {
      if (score >= 8) return "bg-green-500";
      if (score >= 5) return "bg-yellow-400";
      return "bg-red-500";
    }

    async function fetchTrends() {
      let query = client.from("trends").select("*");

      if (categoryFilter.value !== "All") {
        query = query.eq("category", categoryFilter.value);
      }

      if (stageFilter.value !== "All") {
        query = query.eq("stage", stageFilter.value);
      }

      const { data, error } = await query.order("profit_score", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      container.innerHTML = "";

      data.forEach(trend => {
        const card = document.createElement("div");
        card.className = "bg-white p-4 rounded shadow";

        card.innerHTML = `
          <div class="w-3 h-3 rounded-full ${getColor(trend.profit_score)}"></div>
          <h2 class="text-xl font-semibold mt-2">${trend.name}</h2>
          <p class="text-gray-600">${trend.category} | ${trend.stage}</p>
          <p class="mt-2">${trend.description}</p>
          <p class="mt-2 font-bold">Score: ${trend.profit_score}</p>
        `;

        container.appendChild(card);
      });
    }

    categoryFilter.addEventListener("change", fetchTrends);
    stageFilter.addEventListener("change", fetchTrends);

    fetchTrends();
  </script>

</body>
</html>
