<!DOCTYPE html>
<html>
<head>
  <title>OpportunityHut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="p-4 bg-gray-100">

<h1 class="text-2xl font-bold mb-4 text-center">OpportunityHut 🚀</h1>

<!-- Filters -->
<div class="flex gap-4 justify-center mb-6">
  <select id="categoryFilter" class="border p-2 rounded">
    <option value="">All Categories</option>
  </select>

  <select id="stageFilter" class="border p-2 rounded">
    <option value="">All Stages</option>
  </select>
</div>

<!-- Cards -->
<div id="trendCards" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const SUPABASE_URL = "https://kskruztjvoxmufgexvwc.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtza3J1enRqdm94bXVmZ2V4dndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTgwODEsImV4cCI6MjA4OTc3NDA4MX0.CgDZF0OeT8d8AIsHrnQBkkTBYwAkM8o5h82zIXOmoEw";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const container = document.getElementById("trendCards");
  let allTrends = [];
  const { data, error } = await supabaseClient
    .from("trends")
    .select("*");

  if (error) {
    container.innerHTML = "<p style='color:red'>" + error.message + "</p>";
    return;
  }

  allTrends = data;

  // Populate dropdowns
  const categories = [...new Set(allTrends.map(t => t.category))];
  const stages = [...new Set(allTrends.map(t => t.stage))];

  const categoryDropdown = document.getElementById("categoryFilter");
  const stageDropdown = document.getElementById("stageFilter");

  categories.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    categoryDropdown.appendChild(opt);
  });

  stages.forEach(stage => {
    const opt = document.createElement("option");
    opt.value = stage;
    opt.textContent = stage;
    stageDropdown.appendChild(opt);
  });

  function render(trends) {
    container.innerHTML = "";

    trends.forEach(t => {
      const card = document.createElement("div");
      card.className = "bg-white p-4 rounded shadow cursor-pointer";

      card.innerHTML = `
        <h2 class="font-bold">${t.name}</h2>
        <p>${t.category} | ${t.stage}</p>
        <p class="text-green-600">Score: ${t.profit_score}</p>
      `;

      container.appendChild(card);
    });
  }

  render(allTrends);

  function filter() {
    const cat = categoryDropdown.value;
    const stg = stageDropdown.value;

    const filtered = allTrends.filter(t =>
      (cat === "" || t.category === cat) &&
      (stg === "" || t.stage === stg)
    );

    render(filtered);
  }

  categoryDropdown.addEventListener("change", filter);
  stageDropdown.addEventListener("change", filter);

});
</script>

</body>
</html>
