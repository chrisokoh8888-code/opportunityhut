<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpportunityHut</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <h1 class="text-3xl font-bold text-center mb-4">
    OpportunityHut 🚀
  </h1>

  <!-- Filters -->
  <div class="flex gap-4 justify-center mb-6">
    <select id="categoryFilter" class="border p-2 rounded">
      <option value="">All Categories</option>
    </select>

    <select id="stageFilter" class="border p-2 rounded">
      <option value="">All Stages</option>
    </select>
  </div>

  <!-- Cards -->
  <div id="trendCards" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

<script>
const SUPABASE_URL =”https://kskruztjvoxmufgexvwc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtza3J1enRqdm94bXVmZ2V4dndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTgwODEsImV4cCI6MjA4OTc3NDA4MX0.CgDZF0OeT8d8AIsHrnQBkkTBYwAkM8o5h82zIXOmoEw";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allTrends = [];

async function init() {
  const { data, error } = await supabaseClient
    .from('trends')
    .select('*')
    .order('profit_score', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  allTrends = data;

  populateDropdowns();
  displayTrends(allTrends);
}

function populateDropdowns() {
  const categoryDropdown = document.getElementById('categoryFilter');
  const stageDropdown = document.getElementById('stageFilter');

  const categories = [...new Set(allTrends.map(t => t.category))];
  const stages = [...new Set(allTrends.map(t => t.stage))];

  categories.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    categoryDropdown.appendChild(option);
  });

  stages.forEach(stage => {
    const option = document.createElement('option');
    option.value = stage;
    option.textContent = stage;
    stageDropdown.appendChild(option);
  });

  categoryDropdown.addEventListener('change', filterTrends);
  stageDropdown.addEventListener('change', filterTrends);
}

function filterTrends() {
  const category = document.getElementById('categoryFilter').value;
  const stage = document.getElementById('stageFilter').value;

  const filtered = allTrends.filter(t => {
    return (category === "" || t.category === category) &&
           (stage === "" || t.stage === stage);
  });

  displayTrends(filtered);
}

function displayTrends(trends) {
  const container = document.getElementById('trendCards');
  container.innerHTML = "";

  trends.forEach(trend => {
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded shadow";

    div.innerHTML = `
      <h2 class="font-bold text-lg">${trend.name}</h2>
      <p>${trend.category} | ${trend.stage}</p>
      <p class="text-green-600 font-bold">Score: ${trend.profit_score}</p>
      <p class="text-sm">${trend.description || ""}</p>
    `;

    container.appendChild(div);
  });
}

init();
</script>

</body>
</html>
