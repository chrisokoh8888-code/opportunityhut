<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpportunityHut</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card { @apply border rounded p-4 shadow hover:shadow-lg transition; }
    .profit-low { color: #E74C3C; }      /* Red */
    .profit-medium { color: #F1C40F; }   /* Yellow */
    .profit-high { color: #2ECC71; }     /* Green */
  </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans">

  <header class="text-center mb-6">
    <h1 class="text-3xl font-bold text-blue-600">OpportunityHut 🚀</h1>
    <p class="text-gray-700">Discover trending ways to make money online early</p>
  </header>

  <!-- Filters -->
  <div class="filters flex gap-4 mb-6 justify-center">
    <select id="categoryFilter" class="border p-2 rounded">
      <option value="">All Categories</option>
    </select>

    <select id="stageFilter" class="border p-2 rounded">
      <option value="">All Stages</option>
    </select>
  </div>

  <!-- Trend Cards Container -->
  <div id="trendCards" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <!-- Cards will be dynamically generated here -->
  </div>

  <footer class="text-center mt-10 text-gray-500">
    &copy; 2026 OpportunityHut
  </footer>

  <!-- -------------------
       JS Section
  ------------------- -->
  <script>
    // -------------------
    // Supabase Setup
    // -------------------
    const SUPABASE_URL = "https://kskruztjvoxmufgexvwc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtza3J1enRqdm94bXVmZ2V4dndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTgwODEsImV4cCI6MjA4OTc3NDA4MX0.CgDZF0OeT8d8AIsHrnQBkkTBYwAkM8o5h82zIXOmoEw";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function testConnection() {
  console.log("Testing connection...");

  const { data, error } = await supabaseClient
    .from('trends')
    .select('*');

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById('trendCards');

  if (error) {
    container.innerHTML = "<p style='color:red;'>Error: " + error.message + "</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No data coming from Supabase</p>";
    return;
  }

  container.innerHTML = "<p style='color:green;'>Data is coming! Check console.</p>";
}

testConnection();
</script>
</body>
</html>
