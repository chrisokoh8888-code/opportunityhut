<!DOCTYPE html>
<html>
<head>
  <title>OpportunityHut Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">

<h1 class="text-2xl font-bold mb-4">OpportunityHut 🚀</h1>

<div id="trendCards" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

<script>
const trends = [
  { name: "Faceless YouTube Channels", category: "YouTube", stage: "Early", profit_score: 9.6 },
  { name: "AI Chatbots", category: "Apps", stage: "Growing", profit_score: 8.8 },
  { name: "NFT Meme Tokens", category: "Crypto", stage: "Early", profit_score: 8.3 }
];

const container = document.getElementById("trendCards");

trends.forEach(t => {
  const card = document.createElement("div");
  card.className = "bg-white p-4 rounded shadow";

  card.innerHTML = `
    <h2 class="font-bold">${t.name}</h2>
    <p>${t.category} | ${t.stage}</p>
    <p class="text-green-600">Score: ${t.profit_score}</p>
  `;

  container.appendChild(card);
});
</script>

</body>
</html>
